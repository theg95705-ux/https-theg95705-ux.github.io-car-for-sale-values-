<!DOCTYPE html>

<html lang="en">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>
Vehicle Values
</title>



<!-- SEO -->

<meta 
name="description"
content="Track vehicle prices, demand, rarity and trading values in one place."
>


<meta 
name="robots"
content="index, follow"
>



<!-- Open Graph -->

<meta 
property="og:title"
content="Vehicle Values"
>


<meta 
property="og:description"
content="Track vehicle prices, demand, rarity and trading values."
>



<meta 
property="og:type"
content="website"
>



<!-- FONT -->

<link 
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet"
>



<!-- CSS -->

<link 
rel="stylesheet"
href="values.css"
>



</head>






<body>




<!-- ==========================================
     HEADER
========================================== -->


<header class="header">



<div class="header-left">


<a 
href="index.html"
class="back-btn"
>

← Back

</a>


</div>





<div class="logo">


<h1>

Vehicle 
<span>
Values
</span>

</h1>


<p>
Vehicle Price Database
</p>


</div>





<div class="header-right">


<button 
id="logoutBtn"
class="logout-btn"
style="display:none;"
>

Logout

</button>


</div>



</header>








<!-- ==========================================
     MAIN CONTENT
========================================== -->


<main class="main-container">






<h2 class="page-title">

Vehicle Values

</h2>



<p class="page-description">

Search vehicles and view current trading values, demand and rarity.

</p>








<!-- ==========================================
     SEARCH + FILTER BAR
========================================== -->


<section class="filter-panel">





<div class="search-box">


<input

type="text"

id="searchInput"

placeholder="Search vehicle..."

>


</div>







<div class="filter-box">


<select id="demandFilter">


<option value="all">

All Demand

</option>



<option value="10">

10/10

</option>


<option value="9">

9/10

</option>


<option value="8">

8/10

</option>


<option value="7">

7/10

</option>


<option value="6">

6/10

</option>


<option value="5">

5/10

</option>


<option value="4">

4/10

</option>


<option value="3">

3/10

</option>


<option value="2">

2/10

</option>


<option value="1">

1/10

</option>


<option value="0">

0/10

</option>



</select>


</div>







<div class="filter-box">


<select id="sortFilter">


<option value="default">

Sort By

</option>


<option value="valueHigh">

Highest Value

</option>


<option value="valueLow">

Lowest Value

</option>


<option value="nameAZ">

Name A-Z

</option>


<option value="nameZA">

Name Z-A

</option>


<option value="demandHigh">

Highest Demand

</option>


<option value="demandLow">

Lowest Demand

</option>



</select>


</div>








<div class="limited-filter">


<label>


<input

type="checkbox"

id="limitedOnly"

>


Limited Only


</label>


</div>





</section>








<!-- ==========================================
     VEHICLE GRID START
========================================== -->


<section

id="cardsContainer"

class="vehicle-grid"


>


    <!-- ==========================================
     VEHICLE CARD TEMPLATE
========================================== -->


<template id="vehicleCardTemplate">


<div class="card">



<div class="limited-badge">

LIMITED

</div>






<div class="vehicle-image">


<img 

src=""

alt="Vehicle Image"

>


</div>







<div class="vehicle-info">



<div class="name-box">


<h3 class="name-value">

Unnamed Vehicle

</h3>


</div>







<div class="stats">



<div class="stat-box">


<span class="stat-title">

Demand

</span>


<span class="demand-value">

0/10

</span>


</div>







<div class="stat-box">


<span class="stat-title">

Value

</span>


<span class="value-text">

$0

</span>


</div>




</div>






</div>





</div>


</template>









<!-- ==========================================
     ADMIN LOGIN OVERLAY
========================================== -->


<div

id="loginOverlay"

class="overlay"


>





<div class="admin-box">



<h2>

Admin Login

</h2>






<input

id="loginEmail"

type="email"

placeholder="Email"

>





<input

id="loginPassword"

type="password"

placeholder="Password"

>







<div class="admin-buttons">



<button

id="loginBtn"

class="primary-btn"

>

Sign In

</button>





<button

id="loginCancelBtn"

class="secondary-btn"

>

Cancel

</button>



</div>





</div>





</div>









<!-- ==========================================
     ADMIN VEHICLE EDITOR
========================================== -->


<div

id="adminOverlay"

class="overlay"


>





<div class="admin-box editor">






<h2>

Edit Vehicle

</h2>








<label>

Vehicle Name

</label>


<input

id="vehicleName"

type="text"

placeholder="Vehicle Name"

>








<label>

Vehicle Value

</label>


<input

id="vehicleValue"

type="number"

placeholder="Value"

>









<label>

Demand

</label>



<select

id="vehicleDemand"

>


<option value="10">

10/10

</option>


<option value="9">

9/10

</option>


<option value="8">

8/10

</option>


<option value="7">

7/10

</option>


<option value="6">

6/10

</option>


<option value="5">

5/10

</option>


<option value="4">

4/10

</option>


<option value="3">

3/10

</option>


<option value="2">

2/10

</option>


<option value="1">

1/10

</option>


<option value="0">

0/10

</option>


</select>








<label>

Image URL

</label>


<input

id="vehicleImage"

type="text"

placeholder="Image URL"

>








<label class="checkbox-row">


<input

id="vehicleLimited"

type="checkbox"

>


Limited Vehicle


</label>








<div class="admin-buttons">



<button

id="saveBtn"

class="primary-btn"

>

Save

</button>







<button

id="cancelBtn"

class="secondary-btn"

>

Cancel

</button>



</div>








</div>





</div>

    <!-- ==========================================
     CLOSE VEHICLE GRID
========================================== -->


</section>







<!-- ==========================================
     PAGINATION
========================================== -->


<section class="pagination-container">



<button

id="previousPage"

class="page-btn"

>

← Previous

</button>






<div

id="pageNumbers"

class="page-numbers"

>

</div>







<button

id="nextPage"

class="page-btn"

>

Next →

</button>



</section>








</main>









<!-- ==========================================
     FOOTER
========================================== -->


<footer class="footer">


<p>

© 2026 Vehicle Values

</p>


<p>

Track prices • Demand • Rarity • Trading Values

</p>


</footer>









<!-- ==========================================
     JAVASCRIPT
========================================== -->


<script

type="module"

src="script.js"

></script>







</body>


</html>
