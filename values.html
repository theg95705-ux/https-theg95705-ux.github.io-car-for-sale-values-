<body>

<header>

    <div class="logo">
        Car <span>Values</span>

    <nav>
        <a href="index.html">Home</a>
        <a href="#">Vehicles</a>
        <a href="#">Updates</a>
        <a href="#">About</a>
    </nav>

</header>

<section class="page-header">

    <a href="index.html" class="back-btn">
        &#8592;
    </a>

</section>

<main class="cards">

    <div class="card" data-id="1"></div>
    <div class="card" data-id="2"></div>
    <div class="card" data-id="3"></div>
    <div class="card" data-id="4"></div>

    <div class="card" data-id="5"></div>

<!-- ==========================================
     ADMIN PANEL
========================================== -->

<div class="admin-overlay" id="adminPanel">

    <div class="admin-panel">

        <h2 class="admin-title">
            Edit <span>Vehicle</span>
        </h2>

        <div class="admin-group">

            <label>Vehicle Name</label>

            <input
                type="text"
                id="vehicleName"
            >

        </div>

        <div class="admin-group">

            <label>Value</label>

            <input
                type="number"
                id="vehicleValue"
            >

        </div>

        <div class="admin-group">

            <label>Demand</label>

            <select id="vehicleDemand">

                <option>Very High</option>
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
                <option>Very Low</option>

            </select>

        </div>

        <div class="button-row">

            <button
                class="save-btn"
                id="saveBtn">

                Save

            </button>

            <button
                class="cancel-btn"
                id="cancelBtn">

                Cancel

            </button>

        </div>

    </div>

</div>

<!-- ==========================================
     FIREBASE
