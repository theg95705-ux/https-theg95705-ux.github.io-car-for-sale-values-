<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vehicle Values</title>

    <!-- SEO -->
    <meta name="description" content="Track vehicle prices, demand, rarity and trading values in one place.">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:title" content="Vehicle Values">
    <meta property="og:description" content="Track vehicle prices, demand, rarity and trading values in one place.">
    <meta property="og:image" content="https://i.postimg.cc/ZRS6Lx4Q/carforsalenz.webp">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Vehicle Values">
    <meta name="twitter:description" content="Track vehicle prices, demand, rarity and trading values in one place.">
    <meta name="twitter:image" content="https://i.postimg.cc/ZRS6Lx4Q/carforsalenz.webp">

    <!-- Favicon -->
    <link rel="icon"
          type="image/webp"
          href="https://i.postimg.cc/ZRS6Lx4Q/carforsalenz.webp">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="values.css">

</head>

<body>

<!-- ========================================= -->
<!-- HEADER -->
<!-- ========================================= -->

<header class="header">

    <div class="logo">
        Vehicle <span>Values</span>
    </div>

    <nav>

        <a href="index.html">
            Home
        </a>

        <a href="values.html" class="active">
            Vehicles
        </a>

        <a href="#">
            Updates
        </a>

        <a href="#">
            About
        </a>

    </nav>

    <button
        id="logoutBtn"
        class="logout-btn"
        style="display:none;">

        Log Out

    </button>

</header>

<!-- ========================================= -->
<!-- PAGE TITLE -->
<!-- ========================================= -->

<section class="page-title">

    <h1>
        Vehicle Collection
    </h1>

    <p>
        Browse every vehicle, compare values, demand and rarity.
    </p>

</section>

<!-- ========================================= -->
<!-- BACK BUTTON -->
<!-- ========================================= -->

<section class="page-header">

    <a href="index.html" class="back-btn">
        &#8592;
    </a>

</section>

<!-- ========================================= -->
<!-- SEARCH + FILTER BAR -->
<!-- ========================================= -->

<section class="toolbar">

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="Search vehicles...">

    </div>

    <div class="filter-group">

        <select id="demandFilter">

            <option value="all">
                All Demand
            </option>

            <option value="10">
                10/10
            </option>

            <option value="9">
                9/10
            </option>

            <option value="8">
                8/10
            </option>

            <option value="7">
                7/10
            </option>

            <option value="6">
                6/10
            </option>

            <option value="5">
                5/10
            </option>

            <option value="4">
                4/10
            </option>

            <option value="3">
                3/10
            </option>

            <option value="2">
                2/10
            </option>

            <option value="1">
                1/10
            </option>

            <option value="0">
                0/10
            </option>

        </select>

        <select id="sortFilter">

            <option value="default">
                Default
            </option>

            <option value="valueHigh">
                Value: High → Low
            </option>

            <option value="valueLow">
                Value: Low → High
            </option>

            <option value="nameAZ">
                Name: A → Z
            </option>

            <option value="nameZA">
                Name: Z → A
            </option>

            <option value="demandHigh">
                Demand: High → Low
            </option>

            <option value="demandLow">
                Demand: Low → High
            </option>

        </select>

        <label class="limited-filter">

            <input
                type="checkbox"
                id="limitedOnly">

            <span>
                Limited Only
            </span>

        </label>

    </div>

</section>

<!-- ========================================= -->
<!-- VEHICLE GRID -->
<!-- ========================================= -->

<main
    class="cards"
    id="cardsContainer">

    <!--
        Vehicle cards are now generated
        automatically by script.js.

        To add more vehicles later,
        simply change:

        const TOTAL_CARDS = 82;

        inside script.js

        No HTML editing required.
    -->

</main>
<!-- =====================================
VEHICLE GRID
===================================== -->


<main class="cards">
<!-- =====================================
VEHICLE GRID
===================================== -->

<main class="cards" id="vehicleGrid">

    <!--
    Vehicle cards are generated automatically
    by script.js.

    Change TOTAL_VEHICLES in script.js to add
    more cards without editing HTML.
    -->

</main>






<!-- =====================================
ADMIN LOGIN OVERLAY
===================================== -->


<div 
class="admin-overlay"
id="loginOverlay">


<div class="admin-panel">


<h2 class="admin-title">

Admin <span>Login</span>

</h2>



<div class="admin-group">


<label>
Email
</label>


<input
type="email"
id="loginEmail"
placeholder="Email">


</div>




<div class="admin-group">


<label>
Password
</label>


<input
type="password"
id="loginPassword"
placeholder="Password">


</div>





<p
id="loginError"
class="login-error"
style="display:none;">

</p>





<div class="button-row">


<button
id="loginBtn"
class="save-btn">

Sign In

</button>



<button
id="loginCancelBtn"
class="cancel-btn">

Cancel

</button>


</div>


</div>

</div>







<!-- =====================================
ADMIN VEHICLE EDITOR
===================================== -->


<div
class="admin-overlay"
id="adminOverlay">


<div class="admin-panel">


<h2 class="admin-title">

Edit <span>Vehicle</span>

</h2>





<div class="admin-group">


<label>
Vehicle Name
</label>


<input
type="text"
id="vehicleName"
placeholder="Vehicle Name">


</div>





<div class="admin-group">


<label>
Vehicle Value
</label>


<input
type="number"
id="vehicleValue"
placeholder="125000">


</div>





<div class="admin-group">


<label>
Vehicle Demand
</label>



<select id="vehicleDemand">


<option value="10">
10/10
</option>

<option value="9">
9/10
</option>

<option value="8">
8/10
</option>

<option value="7">
7/10
</option>

<option value="6">
6/10
</option>

<option value="5">
5/10
</option>

<option value="4">
4/10
</option>

<option value="3">
3/10
</option>

<option value="2">
2/10
</option>

<option value="1">
1/10
</option>

<option value="0">
0/10
</option>


</select>


</div>
<!-- =====================================
IMAGE URL
===================================== -->


<div class="admin-group">


<label>
Vehicle Image URL
</label>


<input
type="text"
id="vehicleImage"
placeholder="https://example.com/car.png">


</div>







<!-- =====================================
LIMITED VEHICLE TOGGLE
===================================== -->


<div class="admin-group">


<div class="limited-setting">


<span>
Limited Vehicle
</span>



<label class="switch">


<input
type="checkbox"
id="vehicleLimited">


<span class="slider"></span>


</label>


</div>


</div>







<!-- =====================================
ADMIN BUTTONS
===================================== -->


<div class="button-row">


<button
id="saveBtn"
class="save-btn">

Save

</button>



<button
id="cancelBtn"
class="cancel-btn">

Cancel

</button>


</div>



</div>


</div>









<!-- =====================================
JAVASCRIPT
===================================== -->


<script 
type="module"
src="script.js">

</script>





</body>

</html>
